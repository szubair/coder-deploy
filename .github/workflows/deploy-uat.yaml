name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TEST

    steps:
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull Latest Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/hello-python:${{ github.event.inputs.image_tag }}

      - name: Run Application
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/hello-python:${{ github.event.inputs.image_tag }}
