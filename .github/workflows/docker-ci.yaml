name: Python Docker CI/CD

on:
  push:
    branches:
      - master

jobs:

  build-and-upload:
    runs-on: ubuntu-latest
    environment: TEST

    steps:
    # Stage 1 - Checkout
    - name: Checkout source code
      uses: actions/checkout@v4

    # Stage 2 - Verify files
    - name: List files
      run: ls -l

    # Stage 3 - Build Docker image
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-python:latest .

    # Run Trivy Scan
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/hello-python:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # Stage 4 - Login to Docker Hub
    - name: Docker Hub Login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Stage 5 - Push image
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/hello-python:latest

    - name: Show Variable
      run: |
        echo "ENABLE_DEPLOY=${{ vars.ENABLE_DEPLOY }}"

  deploy:
    runs-on: ubuntu-latest
    environment: TEST

    needs: build-and-upload

    steps:
      - name: Pull Latest Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/hello-python:latest

      - name: Run Application
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/hello-python:latest
